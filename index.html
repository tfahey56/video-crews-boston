        <h2>If you are looking for an experienced, skilled, well equipped video crew in Boston or New England, your search ends here.</h2>
        <p>Our Emmy award winning camera teams work with independent producers, national broadcasters and international production entities. We have crewed and shot virtually every genre of video production.</p>

                <p>Founder of Video Crews Boston. Emmy award winning DP whose work is seen regularly on 60 Minutes, CBS Sunday Morning, Bloomberg TV, and The Daily Show. Recipient of multiple national EMMYs, a Peabody, and a Telly Award.</p>

            </div>
